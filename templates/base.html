<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}VisionLab{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050508;
      --surface: #0d0d14;
      --surface2: #13131e;
      --border: rgba(255,255,255,0.07);
      --accent: #ff3c6e;
      --accent2: #00e5ff;
      --accent3: #b060ff;
      --text: #e8e8f0;
      --muted: #5a5a7a;
      --success: #00e5b0;
      --warn: #ffaa00;
      --radius: 16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Noise texture overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    /* ── Nav ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex; align-items: center; gap: 0;
      padding: 0 40px;
      height: 64px;
      background: rgba(5,5,8,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
      letter-spacing: 0.05em;
      color: var(--text);
      text-decoration: none;
      margin-right: auto;
      display: flex; align-items: center; gap: 10px;
    }

    .nav-logo span {
      display: inline-block;
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(1.4); }
    }

    .nav-links { display: flex; gap: 4px; }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      padding: 8px 16px;
      border-radius: 8px;
      transition: all 0.2s;
      text-transform: uppercase;
      font-weight: 500;
    }

    .nav-links a:hover, .nav-links a.active {
      color: var(--text);
      background: var(--surface2);
    }

    .nav-links a.active { color: var(--accent); }

    /* ── Page ── */
    main {
      padding-top: 64px;
      min-height: 100vh;
    }

    .page-hero {
      padding: 60px 40px 40px;
      display: flex; flex-direction: column; gap: 8px;
      border-bottom: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .page-hero::after {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(255,60,110,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .page-tag {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 500;
    }

    .page-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.02em;
    }

    .page-sub {
      font-size: 0.8rem;
      color: var(--muted);
      max-width: 500px;
      line-height: 1.7;
    }

    /* ── Grid / Layout ── */
    .content-grid {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 1px;
      background: var(--border);
      min-height: calc(100vh - 64px - 140px);
    }

    .content-grid > * {
      background: var(--bg);
    }

    .panel {
      padding: 32px;
    }

    .panel-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    /* ── Video container ── */
    .video-wrap {
      position: relative;
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      aspect-ratio: 16/9;
      border: 1px solid var(--border);
    }

    .video-wrap img {
      width: 100%; height: 100%;
      object-fit: contain;
      display: block;
    }

    .video-placeholder {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px;
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
    }

    .video-placeholder svg {
      opacity: 0.3;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s;
      text-decoration: none;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: #ff5580;
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(255,60,110,0.3);
    }

    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--surface);
      border-color: rgba(255,255,255,0.15);
    }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      color: var(--text);
      border-color: rgba(255,255,255,0.2);
    }

    .btn-cyan {
      background: var(--accent2);
      color: #000;
    }

    .btn-cyan:hover {
      background: #33eeff;
      box-shadow: 0 8px 24px rgba(0,229,255,0.3);
    }

    .btn-sm { padding: 7px 14px; font-size: 0.65rem; }

    /* ── Effect grid ── */
    .effect-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .effect-btn {
      padding: 10px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
      display: flex; flex-direction: column; gap: 3px;
    }

    .effect-btn span.label {
      font-weight: 500;
      color: var(--text);
      font-size: 0.7rem;
    }

    .effect-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(255,60,110,0.06);
    }

    .effect-btn.active {
      border-color: var(--accent);
      background: rgba(255,60,110,0.1);
      color: var(--accent);
    }

    .effect-btn.active span.label { color: var(--accent); }

    /* ── Status badge ── */
    .status-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 100px;
    }

    .status-badge::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
    }

    .status-live { background: rgba(0,229,176,0.1); color: var(--success); }
    .status-live::before { background: var(--success); animation: pulse 1s infinite; }
    .status-off { background: rgba(255,255,255,0.04); color: var(--muted); }
    .status-off::before { background: var(--muted); }
    .status-warn { background: rgba(255,170,0,0.1); color: var(--warn); }
    .status-warn::before { background: var(--warn); animation: pulse 1s infinite; }

    /* ── Upload zone ── */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 40px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.75rem;
      color: var(--muted);
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }

    .upload-zone:hover, .upload-zone.dragover {
      border-color: var(--accent);
      background: rgba(255,60,110,0.04);
      color: var(--accent);
    }

    .upload-zone svg { opacity: 0.5; }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 20px 0;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 32px; right: 32px;
      z-index: 9998;
      display: flex; flex-direction: column; gap: 8px;
    }

    .toast-msg {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      animation: slideIn 0.2s ease;
      max-width: 300px;
    }

    .toast-msg.success { border-left-color: var(--success); }
    .toast-msg.warn { border-left-color: var(--warn); }

    @keyframes slideIn {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes fadeOut {
      to { opacity: 0; transform: translateX(20px); }
    }

    /* ── Action row ── */
    .action-row {
      display: flex; align-items: center; gap: 8px;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/">
    <span></span>
    VisionLab
  </a>
  <div class="nav-links">
    <a href="/" class="{% if request.path == '/' %}active{% endif %}">início</a>
    <a href="/camera" class="{% if request.path == '/camera' %}active{% endif %}">câmera</a>
    <a href="/image" class="{% if request.path == '/image' %}active{% endif %}">imagem</a>
    <a href="/tracking" class="{% if request.path == '/tracking' %}active{% endif %}">rastreamento</a>
  </div>
</nav>

<main>
  {% block content %}{% endblock %}
</main>

<div id="toast"></div>

<script>
  function toast(msg, type='info') {
    const el = document.createElement('div');
    el.className = `toast-msg ${type}`;
    el.textContent = msg;
    document.getElementById('toast').appendChild(el);
    setTimeout(() => {
      el.style.animation = 'fadeOut 0.3s forwards';
      setTimeout(() => el.remove(), 300);
    }, 3000);
  }
</script>

{% block scripts %}{% endblock %}
</body>
</html>
